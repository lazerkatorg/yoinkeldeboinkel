name: Windows RDP with Serveo

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 9999

    steps:
    - name: Enable Remote Desktop
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 0
    
    - name: Set Password
      run: Set-LocalUser -Name "runneradmin" -Password (ConvertTo-SecureString -AsPlainText "Password123!" -Force)
    
    - name: Install OpenSSH Client
      run: |
        Add-WindowsCapability -Online -Name OpenSSH.Client~~~~0.0.1.0
    
    - name: Start Serveo Tunnel
      shell: pwsh
      run: |
        Write-Host "Starting Serveo tunnel..."
        Write-Host ""
        
        # Use serveo.net which doesn't require authentication
        & ssh -o StrictHostKeyChecking=no -R 80:localhost:3389 serveo.net 2>&1 | ForEach-Object {
          $line = $_
          Write-Host $line
          
          # Serveo outputs the URL when connected
          if ($line -match "https://([a-z0-9]+\.serveo\.net)") {
            Write-Host ""
            Write-Host "========================================="
            Write-Host "✅ RDP READY!"
            Write-Host "Connect to: $($Matches[0])"
            Write-Host "Username: runneradmin"
            Write-Host "Password: Password123!"
            Write-Host "========================================="
            Write-Host ""
          }
        }
