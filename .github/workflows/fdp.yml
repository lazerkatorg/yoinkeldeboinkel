name: Windows RDP with Web Client

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 9999

    steps:
    - name: Enable RDP and Set Password
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 0
        Set-LocalUser -Name "runneradmin" -Password (ConvertTo-SecureString -AsPlainText "Password123!" -Force)
    
    - name: Install WebRDP Client
      run: |
        # Download a simple web-based RDP client
        Invoke-WebRequest https://github.com/bolcom/rdp2http/releases/download/v1.0.0/rdp2http.exe -OutFile rdp2http.exe
        Start-Process .\rdp2http.exe -ArgumentList "--port 8080 --target localhost:3389" -NoNewWindow
    
    - name: Create Cloudflare Tunnel
      run: |
        Invoke-WebRequest https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe -OutFile cloudflared.exe
        .\cloudflared.exe tunnel --url http://localhost:8080
