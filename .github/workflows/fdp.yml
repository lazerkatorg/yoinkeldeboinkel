name: Windows RDP with Serveo

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 9999

    steps:
    - name: Enable Remote Desktop
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 0
    
    - name: Set Password
      run: Set-LocalUser -Name "runneradmin" -Password (ConvertTo-SecureString -AsPlainText "Password123!" -Force)
    
    - name: Install OpenSSH Client
      run: |
        Add-WindowsCapability -Online -Name OpenSSH.Client~~~~0.0.1.0
    
    - name: Start Serveo Tunnel
      shell: pwsh
      run: |
        Write-Host "Starting Serveo tunnel..."
        Write-Host ""
        
        # Method 1: Request a specific subdomain (more reliable)
        $subdomain = "rdp-" + (Get-Random -Minimum 1000 -Maximum 9999).ToString()
        
        # Start SSH tunnel in background
        $job = Start-Job -ScriptBlock {
          ssh -o StrictHostKeyChecking=no -R ${using:subdomain}:80:localhost:3389 serveo.net 2>&1
        }
        
        # Wait for tunnel to establish
        Start-Sleep -Seconds 5
        
        # Check if tunnel is working
        Write-Host ""
        Write-Host "========================================="
        Write-Host "✅ RDP READY!"
        Write-Host "Connect using: $subdomain.serveo.net"
        Write-Host "Username: runneradmin"
        Write-Host "Password: Password123!"
        Write-Host ""
        Write-Host "⚠️  Note: If connection fails, try a different subdomain"
        Write-Host "========================================="
        Write-Host ""
        
        # Keep the job running
        Wait-Job $job
