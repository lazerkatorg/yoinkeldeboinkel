name: Windows RDP with Pinggy

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 9999

    steps:
    - name: Enable Remote Desktop
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 0
    
    - name: Set Password
      run: Set-LocalUser -Name "runneradmin" -Password (ConvertTo-SecureString -AsPlainText "Password123!" -Force)
    
    - name: Install OpenSSH Client
      run: |
        Add-WindowsCapability -Online -Name OpenSSH.Client~~~~0.0.1.0
    
    - name: Start RDP Tunnel
      shell: pwsh
      run: |
        # Wait for OpenSSH to be ready
        Start-Sleep -Seconds 10
        
        Write-Host "Starting Pinggy tunnel..."
        
        # Use ssh with -t flag and proper arguments
        $arguments = @(
          "-t",  # Force pseudo-terminal allocation
          "-o", "StrictHostKeyChecking=no",
          "-p", "443",
          "-R", "0:127.0.0.1:3389",
          "qr+tcp@free.pinggy.io"
        )
        
        # Create process with redirected output
        $psi = New-Object System.Diagnostics.ProcessStartInfo
        $psi.FileName = "ssh"
        $psi.Arguments = $arguments
        $psi.UseShellExecute = $false
        $psi.RedirectStandardOutput = $true
        $psi.RedirectStandardError = $true
        $psi.CreateNoWindow = $true
        
        $process = [System.Diagnostics.Process]::Start($psi)
        
        # Read output asynchronously
        $outputBuffer = New-Object System.Collections.ArrayList
        $errorBuffer = New-Object System.Collections.ArrayList
        
        $timeout = 120
        $found = $false
        $startTime = Get-Date
        
        while ((Get-Date) - $startTime -lt [TimeSpan]::FromSeconds($timeout)) {
          # Read stdout
          while (-not $process.StandardOutput.EndOfStream) {
            $line = $process.StandardOutput.ReadLine()
            if ($line) {
              $outputBuffer.Add($line) | Out-Null
              Write-Host "OUT: $line"
              
              if ($line -match "tcp://([a-z0-9]+\.pinggy\.io):(\d+)") {
                Write-Host "========================================="
                Write-Host "✅ RDP READY - CONNECT TO: $($Matches[0])"
                Write-Host "Username: runneradmin"
                Write-Host "Password: Password123!"
                Write-Host "========================================="
                $found = $true
                break
              }
            }
          }
          
          # Read stderr
          while (-not $process.StandardError.EndOfStream) {
            $line = $process.StandardError.ReadLine()
            if ($line) {
              $errorBuffer.Add($line) | Out-Null
              Write-Host "ERR: $line"
              
              # Also check stderr for the address
              if ($line -match "tcp://([a-z0-9]+\.pinggy\.io):(\d+)") {
                Write-Host "========================================="
                Write-Host "✅ RDP READY - CONNECT TO: $($Matches[0])"
                Write-Host "Username: runneradmin"
                Write-Host "Password: Password123!"
                Write-Host "========================================="
                $found = $true
                break
              }
            }
          }
          
          if ($found) { break }
          
          Start-Sleep -Milliseconds 500
        }
        
        if (-not $found) {
          Write-Host "Failed to get tunnel address after $timeout seconds"
          Write-Host "Full output captured:"
          $outputBuffer -join "`n"
          $errorBuffer -join "`n"
        }
        
        # Keep the process running
        $process.WaitForExit()
