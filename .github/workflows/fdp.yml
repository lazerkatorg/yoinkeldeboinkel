name: Windows RDP with Pinggy

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 9999

    steps:
    - name: Enable Remote Desktop
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 0
    
    - name: Set Password
      run: Set-LocalUser -Name "runneradmin" -Password (ConvertTo-SecureString -AsPlainText "Password123!" -Force)
    
    - name: Install OpenSSH Client
      run: |
        Add-WindowsCapability -Online -Name OpenSSH.Client~~~~0.0.1.0
    
    - name: Start RDP Tunnel
      shell: pwsh
      run: |
        # Wait for OpenSSH to be ready
        Start-Sleep -Seconds 10
        
        # Test SSH availability
        $sshPath = Get-Command ssh -ErrorAction SilentlyContinue
        if (-not $sshPath) {
          Write-Host "SSH not found, installing manually..."
          Add-WindowsCapability -Online -Name OpenSSH.Client~~~~0.0.1.0
          Start-Sleep -Seconds 10
        }
        
        Write-Host "Starting Pinggy tunnel..."
        
        # Create tunnel and capture output directly
        $process = Start-Process -FilePath "ssh" -ArgumentList "-o StrictHostKeyChecking=no", "-p", "443", "-R0:127.0.0.1:3389", "qr+tcp@free.pinggy.io" -NoNewWindow -PassThru -RedirectStandardOutput "tunnel_output.txt" -RedirectStandardError "tunnel_error.txt"
        
        # Read output file
        $timeout = 120
        $found = $false
        
        for ($i = 0; $i -lt $timeout; $i++) {
          if (Test-Path "tunnel_output.txt") {
            $output = Get-Content "tunnel_output.txt" -Raw
            if ($output -match "tcp://([a-z0-9]+\.pinggy\.io):(\d+)") {
              Write-Host "========================================="
              Write-Host "✅ RDP READY - CONNECT TO: $($Matches[0])"
              Write-Host "Username: runneradmin"
              Write-Host "Password: Password123!"
              Write-Host "========================================="
              $found = $true
              break
            }
          }
          
          if (Test-Path "tunnel_error.txt") {
            $errorOutput = Get-Content "tunnel_error.txt" -Raw
            if ($errorOutput) {
              Write-Host "Tunnel error: $errorOutput"
            }
          }
          
          Write-Host "Waiting for tunnel address... ($i seconds)"
          Start-Sleep -Seconds 1
        }
        
        if (-not $found) {
          Write-Host "Failed to get tunnel address. Check connectivity."
          Write-Host "SSH version:"
          ssh -V
        }
        
        # Keep process running
        $process.WaitForExit()
