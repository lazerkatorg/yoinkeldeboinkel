name: Windows RDP with Serveo

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 9999

    steps:
    - name: Enable Remote Desktop
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 0
    
    - name: Set Password
      run: Set-LocalUser -Name "runneradmin" -Password (ConvertTo-SecureString -AsPlainText "Password123!" -Force)
    
    - name: Install OpenSSH Client
      run: |
        Add-WindowsCapability -Online -Name OpenSSH.Client~~~~0.0.1.0
    
    - name: Start Serveo Tunnel
      shell: pwsh
      run: |
        Write-Host "Starting Serveo TCP tunnel for RDP..."
        Write-Host ""
        
        # Use TCP forwarding (not HTTP) - the -R flag with port:host:port format
        # Format: -R <remote_port>:<local_host>:<local_port>
        # Using 0.0.0.0 as local host to bind to all interfaces
        & ssh -o StrictHostKeyChecking=no -R 0.0.0.0:3389:localhost:3389 serveo.net 2>&1 | ForEach-Object {
          $line = $_
          Write-Host $line
          
          # Serveo outputs the TCP forwarding URL when connected
          if ($line -match "Forwarding TCP connections from serveo\.net on port (\d+)") {
            Write-Host ""
            Write-Host "========================================="
            Write-Host "✅ RDP READY!"
            Write-Host "Connect to: serveo.net:$($Matches[1])"
            Write-Host "Or use your assigned subdomain: [random].serveo.net:$($Matches[1])"
            Write-Host "Username: runneradmin"
            Write-Host "Password: Password123!"
            Write-Host "========================================="
            Write-Host ""
          }
          # Alternative pattern that might appear
          if ($line -match "Forwarding TCP connections from ([\w-]+\.serveo\.net) to localhost:3389") {
            Write-Host ""
            Write-Host "========================================="
            Write-Host "✅ RDP READY!"
            Write-Host "Connect to: $($Matches[1])"
            Write-Host "Username: runneradmin"
            Write-Host "Password: Password123!"
            Write-Host "========================================="
            Write-Host ""
          }
        }
