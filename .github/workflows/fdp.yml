name: Windows RDP with ngrok

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 9999

    steps:
    - name: Enable Remote Desktop
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 0
    
    - name: Set Password
      run: Set-LocalUser -Name "runneradmin" -Password (ConvertTo-SecureString -AsPlainText "Password123!" -Force)
    
    - name: Setup ngrok
      run: |
        Invoke-WebRequest -Uri "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile "ngrok.zip"
        Expand-Archive -Path "ngrok.zip" -DestinationPath "."
        # You need to sign up at ngrok.com and add your token
        # Add your token as a GitHub secret: NGROK_AUTH_TOKEN
        .\ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
    
    - name: Start ngrok TCP Tunnel
      shell: pwsh
      run: |
        Write-Host "Starting ngrok TCP tunnel..."
        
        # Start ngrok in background
        $ngrok = Start-Process -FilePath ".\ngrok.exe" -ArgumentList "tcp 3389" -NoNewWindow -PassThru
        
        Start-Sleep -Seconds 5
        
        # Get tunnel info from API
        try {
          $tunnels = Invoke-RestMethod -Uri "http://localhost:4040/api/tunnels"
          $tcpTunnel = $tunnels.tunnels | Where-Object { $_.proto -eq "tcp" }
          
          Write-Host ""
          Write-Host "========================================="
          Write-Host "✅ RDP READY!"
          Write-Host "Connect to: $($tcpTunnel.public_url)"
          Write-Host "Username: runneradmin"
          Write-Host "Password: Password123!"
          Write-Host ""
          Write-Host "Connect using any RDP client (Windows Remote Desktop, FreeRDP, etc.)"
          Write-Host "========================================="
          Write-Host ""
        }
        catch {
          Write-Host "Error getting tunnel info. Check ngrok is running."
        }
        
        # Keep running
        Wait-Process -Id $ngrok.Id
